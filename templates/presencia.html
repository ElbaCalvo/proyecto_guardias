<!DOCTYPE html>
<html>
<head>
    <title>Control de presencia</title>
</head>

<body>

<h1>Control de presencia</h1>

{% for p in profesores %}

<form method="POST" action="/toggle_presencia">

    <input type="hidden" name="profesor_id" value="{{ p[0] }}">

    <button type="submit">
        {{ p[1] }}
        
        {# Comparamos con 1 porque en SQLite el booleano se almacena como 1 o 0 #}
        {% if p[2] == 1 %}
            - PRESENTE
        {% else %}
            - AUSENTE
        {% endif %}
    </button>

</form>

<br>

{% endfor %}

<br>
<a href="/">Volver</a>

</body>
</html>
